services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: discord-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env.production
    volumes:
      - ./media:/app/media
    networks:
      - proxy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: discord-bot
    restart: unless-stopped
    environment:
      - APP_BASE_URL=http://discord-api:4000
    env_file:
      - .env.production
    volumes:
      - ./media:/app/media
    depends_on:
      - api
    networks:
      - proxy

  frontend:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=https://dc.amzcraft.top
        - VITE_DISCORD_CLIENT_ID=1203537182078410803
        - VITE_DISCORD_REDIRECT_URI=https://discord.amzcraft.top/auth/callback
    container_name: discord-frontend
    restart: unless-stopped
    ports:
      - "4002:80"
    networks:
      - proxy

networks:
  proxy:
    external: true
